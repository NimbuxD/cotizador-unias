<div class="nav-header" [class.narrow]="narrow">
  <div class="nav-logo">
    <mat-icon class="logo-icon">spa</mat-icon>
    @if (!narrow) {
      <span class="logo-text">Cotizador Uñas</span>
    }
  </div>
</div>

<mat-divider></mat-divider>

<mat-nav-list [class.narrow]="narrow">
  @for (item of navItems; track item.path) {
    <a mat-list-item
       [routerLink]="item.path"
       routerLinkActive="active-link"
       [routerLinkActiveOptions]="{exact: item.path === '/dashboard'}"
       [matTooltip]="narrow ? item.label : ''"
       matTooltipPosition="right">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      @if (!narrow) {
        <span matListItemTitle>{{ item.label }}</span>
      }
    </a>
  }
</mat-nav-list>

<div class="nav-spacer"></div>

<mat-divider></mat-divider>

@if (currentUser) {
  <div class="user-section" [class.narrow]="narrow">
    @if (currentUser.photoURL) {
      <img
        [src]="currentUser.photoURL"
        [alt]="getDisplayName()"
        class="user-avatar"
        [matTooltip]="narrow ? getDisplayName() : ''"
        matTooltipPosition="right"
      />
    } @else {
      <div
        class="user-avatar-placeholder"
        [matTooltip]="narrow ? getDisplayName() : ''"
        matTooltipPosition="right"
      >
        <mat-icon>account_circle</mat-icon>
      </div>
    }
    @if (!narrow) {
      <div class="user-info">
        <span class="user-name">{{ getDisplayName() }}</span>
        <span class="user-email">{{ currentUser.email }}</span>
      </div>
    }
    <button
      mat-icon-button
      class="logout-btn"
      (click)="logout()"
      [matTooltip]="'Cerrar sesión'"
      matTooltipPosition="right"
    >
      <mat-icon>logout</mat-icon>
    </button>
  </div>
}
